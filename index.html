<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F5EFE0">
  <title>VERA PASTA — La Vera Cucina</title>
  <meta name="description" content="VERA PASTA — تجربة باستا إيطالية أصيلة في الرياض. La vera cucina italiana.">
  <link rel="icon" href="assets/logo/favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,500;1,400;1,500&family=IBM+Plex+Sans+Arabic:wght@400;500;600&family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- hero LCP: preload the pipeline's default hero files; if the client swaps
       formats the 404 is harmless and the runtime probe still finds the image -->
  <link rel="preload" as="image" href="assets/hero/hero.avif"
        imagesrcset="assets/hero/hero-sm.avif 800w, assets/hero/hero.avif 1600w"
        imagesizes="(min-width:1024px) 30vw, 58vw">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">

  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/Observer.min.js"></script>
  <script type="module" src="js/app.js"></script>
</head>
<body data-mood="cream">

  <!-- Cinematic loader (works before JS) -->
  <div id="loader" aria-hidden="true">
    <div class="loader__inner">
      <div class="wordmark wordmark--lg">
        <span class="wordmark__vera">VERA</span>
        <span class="wordmark__divider"></span>
        <span class="wordmark__pasta">PASTA</span>
      </div>
      <p class="loader__tag" dir="ltr" lang="it">la vera cucina</p>
      <div class="loader__bar"><span id="loader-line"></span></div>
    </div>
  </div>

  <!-- Atmosphere: two crossfading fixed layers + grain -->
  <div class="atmosphere" aria-hidden="true">
    <div class="atmo-layer atmo--cream" data-slot="a" style="opacity:1"></div>
    <div class="atmo-layer" data-slot="b" style="opacity:0"></div>
  </div>
  <div class="grain" aria-hidden="true"></div>

  <!-- Floating nav -->
  <header id="nav" class="nav">
    <a class="nav__logo" href="#top" data-goto="0" aria-label="VERA PASTA">
      <span class="wordmark wordmark--sm">
        <span class="wordmark__vera">VERA</span>
        <span class="wordmark__divider"></span>
        <span class="wordmark__pasta">PASTA</span>
      </span>
    </a>
    <div class="nav__actions">
      <button id="lang-toggle" class="nav__lang" type="button" aria-label="Switch language">EN</button>
    </div>
  </header>

  <!-- Snap scroller -->
  <main id="snap" class="snap-container" tabindex="-1">

    <!-- HERO -->
    <section class="screen hero" id="top" data-mood="cream" aria-label="VERA PASTA">
      <div class="hero__particles" aria-hidden="true"></div>
      <figure class="hero__figure" aria-hidden="true">
        <div class="hero__breathe">
          <img id="hero-img" class="hero__img" alt="" decoding="async" fetchpriority="high">
        </div>
      </figure>
      <div class="hero__content">
        <h1 class="wordmark wordmark--hero">
          <span class="wordmark__vera">VERA</span>
          <span class="wordmark__divider"></span>
          <span class="wordmark__pasta">PASTA</span>
        </h1>
        <p class="hero__tagline" dir="ltr" lang="it">La Vera Cucina Italiana</p>
        <p class="hero__intro" data-i18n="heroIntro"></p>
        <button class="btn btn--primary hero__cta" type="button" data-goto="1" data-i18n="exploreMenu"></button>
      </div>
      <div class="swipe-hint" aria-hidden="true">
        <span class="swipe-hint__label" data-i18n="swipeUp"></span>
        <span class="swipe-hint__chevron"></span>
      </div>
    </section>

    <!-- Dish sections + drinks + finale injected by js/menu.js -->

  </main>

  <!-- Progress dot rail -->
  <nav class="rail" id="rail" aria-label="Menu progress"></nav>

  <!-- Order bottom sheet -->
  <dialog id="order-sheet" class="sheet" aria-labelledby="sheet-title">
    <div class="sheet__handle" aria-hidden="true"></div>
    <h3 class="sheet__title" id="sheet-title"></h3>
    <p class="sheet__sub" data-i18n="orderVia"></p>
    <div class="sheet__links" id="sheet-links"></div>
    <button class="sheet__close" type="button" data-i18n="close"></button>
  </dialog>

  <div id="toast" class="toast" role="status"></div>
  <div id="sr-announcer" class="visually-hidden" aria-live="polite"></div>

  <!-- Dish template -->
  <template id="dish-template">
    <section class="screen dish" aria-label="">
      <figure class="dish__figure">
        <div class="dish__breathe">
          <img class="dish__img" alt="" loading="lazy" decoding="async">
        </div>
      </figure>
      <div class="dish__content">
        <p class="dish__kicker"></p>
        <h2 class="dish__name"></h2>
        <p class="dish__subtitle"><span dir="ltr"></span></p>
        <p class="dish__desc"></p>
        <ul class="dish__ingredients" role="list"></ul>
        <div class="dish__meta">
          <p class="dish__price"><span class="dish__price-num"></span> <span class="dish__price-cur"></span></p>
          <span class="dish__metaitem dish__cal"></span>
          <span class="dish__metaitem dish__time"></span>
        </div>
        <div class="dish__badges"></div>
        <div class="dish__actions">
          <button class="btn btn--primary dish__order" type="button"></button>
          <button class="iconbtn dish__fav" type="button" aria-pressed="false"></button>
          <button class="iconbtn dish__share" type="button"></button>
        </div>
      </div>
    </section>
  </template>

</body>
</html>
